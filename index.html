<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#6d3df5" />
    <meta name="description" content="Find your people and make the most of free time at SHAD." />
    <link rel="icon" type="image/png" href="logo.png" />
    <title>ShadLoop — SHAD free time, sorted</title>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (var i = 0; i < registrations.length; i++) {
            registrations[i].unregister().then(function(success) {
              if (success) {
                console.log('Successfully unregistered stale service worker.');
                window.location.reload();
              }
            });
          }
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
